sonar.organization=rtc-tools-org
sonar.projectKey=rtc-tools_rtc-tools
sonar.projectName=rtc-tools

# Path is relative to the sonar-project.properties file.
sonar.sources=src
sonar.tests=tests
sonar.exclusions=src/rtctools/version.py

# Encoding of the source code. Default is default system encoding.
sonar.sourceEncoding=UTF-8

# Python versions supported by the project.
sonar.python.version=3.10, 3.11, 3.12, 3.13, 3.14
sonar.python.coverage.reportPaths=coverage.xml
